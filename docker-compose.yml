version: '3.8'

services:
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: mediflow_postgres
    environment:
      POSTGRES_USER: mediflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mediflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data

  redis:
    image: redis:7-alpine
    container_name: mediflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
